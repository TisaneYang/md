# 摄像头配置文件
# 定义路侧摄像头的位姿、内参和相互关系
# 配置与leaderboard_evaluator.py中的CARLA相机设置保持一致

cameras:
  # 前置摄像头：面向车辆方向
  - id: "front"
    name: "前置路侧摄像头"
    location:
      x: 266.30
      y: -307.80
      z: 5.00
    rotation:
      pitch: -5.71
      yaw: 180.00
      roll: 0.00
    intrinsics:
      # 内参根据CARLA相机设置计算
      # image_size_x=800, image_size_y=600, fov=90
      # fx = fy = image_width / (2 * tan(fov/2))
      # fx = fy = 800 / (2 * tan(45°)) = 800 / 2 = 400
      fx: 400.0     # X方向焦距
      fy: 400.0     # Y方向焦距
      cx: 400.0     # 主点X坐标 (image_width / 2)
      cy: 300.0     # 主点Y坐标 (image_height / 2)
    image_size:
      width: 800    # 与CARLA设置一致
      height: 600   # 与CARLA设置一致
    fov: 90.0       # 视场角（度）

  # 后置摄像头：背向车辆方向
  - id: "rear"
    name: "后置路侧摄像头"
    location:
      x: 266.30
      y: -307.80
      z: 5.00
    rotation:
      pitch: 5.71
      yaw: 360.00
      roll: 0.00
    intrinsics:
      fx: 400.0     # X方向焦距
      fy: 400.0     # Y方向焦距
      cx: 400.0     # 主点X坐标
      cy: 300.0     # 主点Y坐标
    image_size:
      width: 800
      height: 600
    fov: 90.0

# 摄像头之间的关系描述
camera_relationships:
  - cameras: ["front", "rear"]
    type: "back_to_back"
    description: "两个摄像头背靠背设置在同一位置，前置摄像头面向车辆起点，后置摄像头背向车辆"
    distance_from_vehicle: 50.0  # 距离车辆起点50米
    height_above_ground: 5.0     # 距离地面5米
