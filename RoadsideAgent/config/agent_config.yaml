# 路侧智能体Agent配置文件

# LLM配置
llm:
  # 提供商: 'openai' 或 'anthropic'
  provider: "openai"

  # 模型名称
  model: "qwen-3.6-plus"

  # API密钥（建议使用环境变量）
  # 可以设置为 "${OPENAI_API_KEY}" 或 "${ANTHROPIC_API_KEY}"
  api_key: "sk-2ba18455e015465c9aea9048161aa766"

  # 最大生成token数
  max_tokens: 2000

  # 温度参数（0.0-1.0）
  temperature: 0.0

# Agent行为配置
agent:
  # 是否启用详细日志
  verbose: true

  # 置信度阈值
  confidence_threshold: 0.6

  # 是否保存分析结果
  save_results: true

  # 结果保存路径
  results_dir: "results/"

  # 定期触发配置
  periodic_trigger:
    # 是否启用定期触发
    enabled: false

    # 触发间隔（秒）
    interval: 3

    # 是否在没有车辆信息时跳过分析
    skip_if_no_vehicle: true

# 图像处理配置
image_processing:
  # 是否压缩图像以减少token消耗
  compress_images: true

  # 最大图像尺寸（像素）
  max_image_size: 1024

  # JPEG质量（1-100）
  jpeg_quality: 85

  # 是否保存输入给模型的图像
  save_input_images: true

  # 图像保存目录
  input_images_dir: "debug/input_images/"

# 风险评估配置
risk_assessment:
  # 高风险关键词
  high_risk_keywords:
    - "碰撞"
    - "危险"
    - "紧急"
    - "闯红灯"
    - "逆行"

  # 中风险关键词
  medium_risk_keywords:
    - "注意"
    - "减速"
    - "谨慎"
    - "盲区"

  # 低风险关键词
  low_risk_keywords:
    - "安全"
    - "正常"
    - "畅通"
